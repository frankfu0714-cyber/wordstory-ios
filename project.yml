name: wordstory
options:
  bundleIdPrefix: com.frankfu
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "632H46CT74"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  wordstory:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wordstory
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.frankfu.wordstory
        PRODUCT_NAME: wordstory
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        # Fallback display name (matches en.lproj/InfoPlist.strings).
        # Per-locale CFBundleDisplayName overrides take precedence:
        #   en.lproj      → "Wordstory"
        #   zh-Hant.lproj → "故事辭典"
        INFOPLIST_KEY_CFBundleDisplayName: Wordstory
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleLocalizations: "en zh-Hant"
        INFOPLIST_KEY_CFBundleDevelopmentRegion: en
        SWIFT_EMIT_LOC_STRINGS: YES

  wordstoryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources: wordstoryUITests
    dependencies:
      - target: wordstory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.frankfu.wordstoryUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: wordstory
